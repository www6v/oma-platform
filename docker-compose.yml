services:
  oma-platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
    ports:
      - "8787:8787"
    environment:
      DATABASE_PATH: /data/oma.db
      SANDBOX_WORKDIR: /data/sandboxes
      HARNESS_URL: http://oma-harness:8090
      OMA_API_KEY: ${OMA_API_KEY:-dev-key}
      OMA_FAKE_HARNESS: ${OMA_FAKE_HARNESS:-1}
      # Optional console: run ./scripts/build-console.sh, then set:
      # CONSOLE_DIR=/app/console and uncomment the volume below.
      CONSOLE_DIR: ${CONSOLE_DIR:-}
      AUTH_DISABLED: ${AUTH_DISABLED:-0}
      AUTH_UPSTREAM_URL: ${AUTH_UPSTREAM_URL:-http://host.docker.internal:8788}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8787}
    volumes:
      - ./data:/data
      # - ${CONSOLE_DIST:-./console/dist}:/app/console:ro
    depends_on:
      oma-harness:
        condition: service_healthy

  oma-harness:
    build:
      context: ..
      dockerfile: oma-platform/Dockerfile.harness
    ports:
      - "8090:8090"
    environment:
      OMA_FAKE_HARNESS: ${OMA_FAKE_HARNESS:-1}
    volumes:
      - ${HOME}/.pi/agent:/root/.pi/agent:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
