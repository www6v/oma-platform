services:
  oma-platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
    ports:
      - "8787:8787"
    environment:
      DATABASE_PATH: /data/oma.db
      SANDBOX_WORKDIR: /data/sandboxes
      HARNESS_URL: http://oma-harness:8090
      OMA_API_KEY: ${OMA_API_KEY:-dev-key}
      OMA_FAKE_HARNESS: ${OMA_FAKE_HARNESS:-1}
      # Optional console: build ../open-managed-agents/apps/console/dist, then set:
      # CONSOLE_DIR=/app/console OMA_CONSOLE_DEV=1 and uncomment the volume below.
      CONSOLE_DIR: ${CONSOLE_DIR:-}
      OMA_CONSOLE_DEV: ${OMA_CONSOLE_DEV:-0}
    volumes:
      - ./data:/data
      # - ${CONSOLE_DIST:-../open-managed-agents/apps/console/dist}:/app/console:ro
    depends_on:
      oma-harness:
        condition: service_healthy

  oma-harness:
    build:
      context: ..
      dockerfile: oma-platform/Dockerfile.harness
    ports:
      - "8090:8090"
    environment:
      OMA_FAKE_HARNESS: ${OMA_FAKE_HARNESS:-1}
    volumes:
      - ${HOME}/.pi/agent:/root/.pi/agent:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
