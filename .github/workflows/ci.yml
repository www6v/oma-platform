name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: E2E smoke (create agent → session → message → reply)
        run: go test ./internal/api/ -run TestE2ESmoke -count=1 -v

      - name: Crash recovery (SIGKILL → restart, ported from main-node)
        run: go test ./internal/api/ -run TestCrashRecovery -count=1 -v

  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: go test
        run: go test ./... -count=1

  harness-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: OMA contract tests
        working-directory: harness
        run: PYTHONPATH=. pytest tests/test_oma_contract.py -v
